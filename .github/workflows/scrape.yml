name: Scrape and deploy

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 8am UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr", "rvest", "jsonlite", "data.table", "purrr"), repos="https://cloud.r-project.org")'

      - name: Run scraper
        run: Rscript scrape-swish.R

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html swish-sessions.csv
          git diff --cached --quiet || git commit -m "Update class data $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
